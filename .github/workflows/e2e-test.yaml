name: E2E Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e-cluster-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install k3d
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
          k3d version

      - name: Install Task
        uses: go-task/setup-task@v1
        with:
          version: 3.x

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Install helm-unittest plugin
        run: helm plugin install --verify=false --version v1.0.3 https://github.com/helm-unittest/helm-unittest

      - name: Run Helm unit tests
        run: task test:unit

      - name: Build cluster configuration (with public images)
        run: task build:cluster USE_PUBLIC_IMAGES=true

      - name: Create K3D cluster
        run: task create:cluster
        env:
          REGISTRY1_USERNAME: ${{ secrets.REGISTRY1_USERNAME }}
          REGISTRY1_PASSWORD: ${{ secrets.REGISTRY1_PASSWORD }}

      - name: Wait for cluster to be ready
        run: |
          kubectl wait --for=condition=Ready nodes --all --timeout=300s
          kubectl get nodes -o wide

      - name: Wait for Flux controllers to be ready
        run: |
          echo "Waiting for Flux controllers..."
          kubectl wait deploy/source-controller deploy/helm-controller deploy/kustomize-controller deploy/notification-controller --for=condition=Available --timeout=300s
          echo ""
          echo "=== Flux Controllers Status ==="
          kubectl get deploy -l app=source-controller -l app=helm-controller -l app=kustomize-controller -l app=notification-controller 2>/dev/null || kubectl get deploy | grep -E "controller"
          echo ""
          echo "=== Flux Controller Versions ==="
          kubectl get pods -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.spec.containers[0].image}{"\n"}{end}' | grep controller

      - name: Verify Flux is operational
        run: |
          echo "=== Checking Flux source-controller ==="
          kubectl -n default logs deploy/source-controller --tail=5 || true
          echo ""
          echo "=== Checking Flux helm-controller ==="
          kubectl -n default logs deploy/helm-controller --tail=5 || true

      - name: Display cluster info
        if: always()
        run: |
          echo "=== Cluster Nodes ==="
          kubectl get nodes || true
          echo ""
          echo "=== Cluster Services ==="
          kubectl get services || true
          echo ""
          echo "=== Docker Containers ==="
          docker ps --filter "name=k3d-bb-helm" || true
          echo ""
          echo "=== Resource Usage ==="
          docker stats --no-stream $(docker ps --filter "name=k3d-bb-helm" -q) || true

      - name: Cleanup
        if: always()
        run: k3d cluster delete bb-helm || true
