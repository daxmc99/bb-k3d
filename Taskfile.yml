version: '3'

vars:
  BIGBANG_DIR: dist/bigbang
  BIGBANG_K3D_CHART: chart
  USE_PUBLIC_IMAGES: "false"

tasks:
  default:
    desc: Run all tests (unit + e2e)
    cmds:
      - task: test:unit
      - task: test:e2e

  clone-bigbang:
    desc: Clone Big Bang repository from repo1.dso.mil (if not already present)
    cmds:
      - if [ ! -d "{{.BIGBANG_DIR}}" ]; then git clone https://repo1.dso.mil/big-bang/bigbang dist/bigbang; fi

  test:
    desc: Run helm lint on the chart
    cmds:
      - helm lint chart

  test:unit:
    desc: Run helm unit tests using helm-unittest plugin
    cmds:
      - helm unittest chart

  test:e2e:
    desc: Run end-to-end tests (clean, clone, build, create cluster, deploy Big Bang)
    cmds:
      - task: clone-bigbang
      - task: build:cluster
      - task: create:cluster
      - task: deploy:bigbang

  delete:cluster:
    desc: Clean up dist directory (removes generated configs and Big Bang clone)
    cmds:
      - k3d cluster delete --config dist/k3d.yaml
      - rm -rf dist

  build:cluster:
    desc: Generate bootstrap.yaml and k3d.yaml configuration files (set USE_PUBLIC_IMAGES=true for public images)
    vars:
      USE_PUBLIC: '{{default "false" .USE_PUBLIC_IMAGES}}'
      VALUES_FLAG: '{{if eq .USE_PUBLIC "true"}}-f {{.BIGBANG_K3D_CHART}}/values-public.yaml{{end}}'
    cmds:
      - mkdir -p dist
      - echo "Generating bootstrap.yaml (flux + metallb + nginx)"
      - helm template k3d "{{.BIGBANG_K3D_CHART}}" {{.VALUES_FLAG}} > dist/bootstrap.yaml
      - echo "Generating k3d-config"
      - helm template k3d "{{.BIGBANG_K3D_CHART}}"
        {{.VALUES_FLAG}}
        --set=k3d.volumeBaseDir=$(pwd)/dist
        --set-string=registry1.username="${REGISTRY1_USERNAME}"
        --set-string=registry1.password="${REGISTRY1_PASSWORD}"
        --show-only=templates/k3d-config.yaml > dist/k3d.yaml

  create:cluster:
    desc: Create K3D cluster using generated k3d.yaml (requires REGISTRY1 env vars)
    preconditions:
      - sh: test -n "${REGISTRY1_USERNAME}"
        msg: "REGISTRY1_USERNAME environment variable must be set"
      - sh: test -n "${REGISTRY1_PASSWORD}"
        msg: "REGISTRY1_PASSWORD environment variable must be set"
    cmds:
      - k3d cluster delete --config dist/k3d.yaml && k3d cluster create --config dist/k3d.yaml

  deploy:bigbang:
    desc: Deploy Big Bang to the K3D cluster and wait for all HelmReleases to be ready
    cmds:
      - yq eval 'select(.metadata.name == "bigbang-k3d-dev-values") | .stringData["values.yaml"]' dist/bootstrap.yaml > dist/dev-values.yaml
      - helm upgrade --install bigbang {{.BIGBANG_DIR}}/chart
        --namespace=bigbang --create-namespace --values {{.BIGBANG_DIR}}/tests/test-values.yaml
        --values {{.BIGBANG_DIR}}/chart/ingress-certs.yaml
        --values {{.BIGBANG_DIR}}/tests/disable-core-values.yaml
        --values dist/dev-values.yaml
        --set=flux.interval=5s
      - kubectl wait helmrelease -A --selector=app.kubernetes.io/instance=bigbang --for=condition=ready --timeout=800s
