suite: test nginx template
templates:
  - nginx.yaml
tests:
  - it: should not render nginx resources when disabled (default)
    asserts:
      - hasDocuments:
          count: 0

  - it: should render nginx ConfigMap when enabled
    set:
      nginx.enabled: true
    documentIndex: 0
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: nginx-config
      - equal:
          path: metadata.namespace
          value: kube-system
      - isNotEmpty:
          path: data["nginx.conf"]

  - it: should render nginx DaemonSet when enabled
    set:
      nginx.enabled: true
    documentIndex: 1
    asserts:
      - isKind:
          of: DaemonSet
      - equal:
          path: metadata.name
          value: nginx-router
      - equal:
          path: metadata.namespace
          value: kube-system
      - equal:
          path: spec.template.spec.hostNetwork
          value: true
      - equal:
          path: spec.template.spec.containers[0].name
          value: nginx
      - equal:
          path: spec.template.spec.containers[0].image
          value: nginx:1.25-alpine
