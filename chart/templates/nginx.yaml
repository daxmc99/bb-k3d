{{- if .Values.nginx.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: kube-system
data:
  nginx.conf: |
    events {
      worker_connections 1024;
    }

    # HTTP traffic handling
    http {
      # HTTP server - redirect to HTTPS
      server {
        listen 80;
        server_name _;

        location / {
          return 301 https://$host$request_uri;
        }
      }
    }

    # TLS passthrough using stream module
    stream {
      # Map SNI hostname to upstream
      map $ssl_preread_server_name $upstream {
        # Passthrough gateway hosts
        {{- range .Values.k3d.hostAliases.passthrough.hostnames }}
        {{ . }} passthrough_gateway;
        {{- end }}

        # Public gateway hosts
        {{- range .Values.k3d.hostAliases.public.hostnames }}
        {{ . }} public_gateway;
        {{- end }}
        default public_gateway;
      }

      # Upstream for public gateway
      upstream public_gateway {
        server {{ .Values.k3d.hostAliases.public.ip }}:443;
      }

      # Upstream for passthrough gateway
      upstream passthrough_gateway {
        server {{ .Values.k3d.hostAliases.passthrough.ip }}:443;
      }

      # HTTPS passthrough server
      server {
        listen 443;

        ssl_preread on;
        proxy_pass $upstream;
        proxy_protocol off;
      }
    }
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nginx-router
  namespace: kube-system
  labels:
    app: nginx-router
spec:
  selector:
    matchLabels:
      app: nginx-router
  template:
    metadata:
      labels:
        app: nginx-router
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: nginx
        image: nginx:1.25-alpine
        ports:
        - containerPort: 80
          hostPort: 80
          name: http
        - containerPort: 443
          hostPort: 443
          name: https
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config
{{- end }}
